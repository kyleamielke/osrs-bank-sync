name: CI

on:
  push:
    branches: [osrs-bank-sync]
  pull_request:
    branches: [osrs-bank-sync]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build:
    name: java-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@da187c8e6ffbd3802e00f2477aa5a822b25f2dda # v4.4.4

      - name: Build
        run: ./gradlew build --no-daemon

  python-lint:
    name: python-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "stub_server/pyproject.toml"

      - name: Install deps
        run: pip install -e stub_server[dev]

      - name: Ruff
        run: ruff check stub_server

      - name: Mypy
        run: mypy --strict stub_server/src

      - name: Pytest
        run: pytest -v stub_server
